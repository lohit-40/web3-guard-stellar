name: Publish Web3Guard CLI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and Build
        working-directory: web3guard-cli
        run: |
          npm ci
          npm run build

      - name: Publish to NPM
        working-directory: web3guard-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Try publishing to npm, allow fail if no token configured yet
          npm publish || echo "Failed to publish to npm. Ensure NPM_TOKEN is set in Secrets."

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Publish to GitHub Packages
        working-directory: web3guard-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rename package to include the scope for GitHub Packages
          sed -i 's/"name": "web3guard-cli"/"name": "@${{ github.repository_owner }}\/web3guard-cli"/' package.json
          npm publish || echo "Failed to publish to GitHub Packages."
