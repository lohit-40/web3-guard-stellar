name: Web3 Guard CI — Stellar L4

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Soroban Smart Contract Tests (L3 + L4) ─────────────────────────
  soroban-tests:
    name: Soroban Contract — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban_contracts/proof_of_audit/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('soroban_contracts/proof_of_audit/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Soroban Contract Tests (3 tests required for L3)
        working-directory: soroban_contracts/proof_of_audit
        run: cargo test --color always
        env:
          RUST_BACKTRACE: 1

      - name: Build WASM Binary
        working-directory: soroban_contracts/proof_of_audit
        run: cargo build --target wasm32v1-none --release

      - name: Verify WASM Artifact Exists
        run: |
          ls -lh soroban_contracts/proof_of_audit/target/wasm32v1-none/release/proof_of_audit.wasm
          echo "✅ WASM binary built successfully"

  # ─── Job 2: Frontend Build (L4 Production Readiness) ────────────────────────
  frontend-build:
    name: Next.js Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Production Bundle
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_CONTRACT_ID: CDQQQUGCX33O7JAUXOJHPC6JONZ3D5UPWW6IHNUHLPSLF7IPZHQ2WBZU
          NEXT_PUBLIC_STELLAR_NETWORK: testnet

      - name: Confirm Build Success
        run: echo "✅ Next.js production build completed"

  # ─── Job 3: Backend Lint Check ───────────────────────────────────────────────
  backend-check:
    name: Python Backend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Syntax Check
        working-directory: backend
        run: python -m py_compile main.py && echo "✅ Backend syntax OK"
