name: Web3 Guard CI — Stellar L4

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Soroban Smart Contract Tests (L3 + L4) ─────────────────────────
  soroban-tests:
    name: Soroban Contract — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('soroban_contracts/proof_of_audit/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Soroban Contract Tests (3 tests required for L3)
        working-directory: soroban_contracts/proof_of_audit
        run: cargo test --color always
        env:
          RUST_BACKTRACE: 1

      - name: Build WASM Binary
        working-directory: soroban_contracts
        run: cargo build --target wasm32-unknown-unknown --release -p proof-of-audit

      - name: Verify WASM Artifact Exists
        working-directory: soroban_contracts
        run: |
          ls -lh target/wasm32-unknown-unknown/release/proof_of_audit.wasm
          echo "WASM binary built successfully"

  # ─── Job 2: Frontend Build (L4 Production Readiness) ────────────────────────
  frontend-build:
    name: Next.js Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build Production Bundle
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_CONTRACT_ID: CDQQQUGCX33O7JAUXOJHPC6JONZ3D5UPWW6IHNUHLPSLF7IPZHQ2WBZU
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_API_URL: https://placeholder.up.railway.app
          CI: false

      - name: Confirm Build Success
        run: echo "Next.js production build completed"

  # ─── Job 3: Backend Lint Check ───────────────────────────────────────────────
  backend-check:
    name: Python Backend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Core Dependencies
        working-directory: backend
        run: pip install fastapi uvicorn requests python-dotenv pydantic google-generativeai web3 slowapi

      - name: Syntax Check
        working-directory: backend
        run: |
          python -c "
          import ast, sys, os
          files = ['main.py', 'ci_router.py', 'database.py']
          failed = False
          for f in files:
              if os.path.exists(f):
                  try:
                      ast.parse(open(f, encoding='utf-8').read())
                      print('OK: ' + f)
                  except SyntaxError as e:
                      print('FAIL: ' + f + ' - ' + str(e))
                      failed = True
          sys.exit(1 if failed else 0)
          "
